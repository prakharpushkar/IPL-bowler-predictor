<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="IPL Bowling Predictor - AI-powered cricket analytics platform predicting the best bowler using XGBoost machine learning.">
  <meta name="keywords" content="IPL, cricket, prediction, bowling, AI, machine learning, analytics">
  <meta name="theme-color" content="#06060E">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="IPL Predictor">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>IPL Bowling Predictor | AI Cricket Analytics</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preload fonts for faster rendering -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    /* Custom loading screen matching the app theme */
    body {
      margin: 0;
      padding: 0;
      background-color: #06060E;
      overflow: hidden;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      background: radial-gradient(ellipse at center, #0A0A20 0%, #06060E 70%);
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(0,212,255,0.1);
      border-top: 3px solid #00D4FF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      margin-top: 24px;
      color: #8888AA;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .loading-brand {
      margin-top: 8px;
      background: linear-gradient(135deg, #00D4FF, #8B5CF6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 2px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading" class="loading-container">
    <div class="loading-brand">IPL PREDICTOR</div>
    <div style="height: 24px;"></div>
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading Analytics Engine</div>
  </div>
  <script>
    // Remove loading screen once Flutter renders
    window.addEventListener('flutter-first-frame', function() {
      const loader = document.getElementById('loading');
      if (loader) {
        loader.style.transition = 'opacity 0.5s';
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 500);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
